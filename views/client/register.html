<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="author" content="Untree.co" />
    <link rel="apple-touch-icon" href="../assets/client/img/apple-icon.png" />
    <link rel="shortcut icon" type="image/x-icon" href="../../assets/client/img/favicon.ico" />

    <link rel="stylesheet" href="../../assets/client/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../assets/client/css/templatemo.css" />
    <link rel="stylesheet" href="../../assets/client/css/custom.css" />

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;200;300;400;500;700;900&display=swap" />
    <link rel="stylesheet" href="../../assets/client/css/fontawesome.min.css" />
    <script src="https://www.w3schools.com/lib/w3.js"></script>     
    <title>Sơn Jotun - Trang chủ</title>
</head>

<body>

    <!-- Menu -->
    <div w3-include-html="layouts/menu.html"></div>


    <!-- Bắt đầu body -->

    <main class="register-page">
        <div class="register-container">
            <h2>Đăng Ký</h2>
            <form class="register-form">
                <div class="form-group">
                    <label for="fullname">Họ và Tên</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Nhập họ và tên của bạn">
                    <small class="error-message text-danger"></small>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Nhập địa chỉ email">
                </div>
                <div class="form-group">
                    <label for="reg_password">Mật khẩu</label>
                    <input type="password" id="reg_password" name="reg_password" placeholder="Tạo mật khẩu">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Xác nhận Mật khẩu</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Xác nhận mật khẩu"
                       >
                </div>
                <button type="submit" class="btn-register">Đăng Ký Ngay</button>
                <div class="form-footer">
                    <span>Đã có tài khoản?</span>
                    <a href="login.html" class="login-link">Đăng nhập tại đây</a>
                </div>
            </form>
        </div>
    </main>

    <!-- Kết thúc body -->


    <!-- Footer -->
    <div w3-include-html="layouts/footer.html"></div>

    <script>
        w3.includeHTML();
    </script>

    <script src="../../assets/client/js/jquery-1.11.0.min.js"></script>
    <script src="../../assets/client/js/jquery-migrate-1.2.1.min.js"></script>
    <script src="../../assets/client/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/client/js/templatemo.js"></script>
    <script src="../../assets/client/js/custom.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="../../controllers/ui/client/register.js"></script>
    <script type="module" src="../../assets/client/js/menu.js"></script>

</body>

</html>
