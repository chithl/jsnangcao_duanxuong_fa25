<script>
  function decodeJWT(token) {
    let base64Url = token.split(".")[1];
    let base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
    let jsonPayload = decodeURIComponent(
      atob(base64)
        .split("")
        .map(function (c) {
          return "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2);
        })
        .join("")
    );
    return JSON.parse(jsonPayload);
  }

  function handleCredentialResponse(response) {
    // Gọi API đăng nhập/đăng ký bằng Google và lưu session
    if (!response || !response.credential) {
      alert("Không nhận được thông tin đăng nhập Google");
      return;
    }

    // Dynamic import để dùng lại AuthAPI (ES module)
    import("../../controllers/api/AuthAPI.js")
      .then(async ({ AuthAPI }) => {
        const auth = new AuthAPI();
        const result = await auth.loginWithGoogle(response.credential);

        if (!result.success) {
          const msg =
            (result.errors && result.errors[0] && result.errors[0].message) ||
            "Đăng nhập Google thất bại";
          alert(msg);
          return;
        }

        // Lưu token + user, chuyển hướng về trang chủ
        localStorage.setItem("token", result.data.token);
        localStorage.setItem("user", JSON.stringify(result.data.user));
        alert("Đăng nhập bằng Google thành công");
        window.location.href = "index.html";
      })
      .catch((err) => {
        console.error("Import AuthAPI lỗi:", err);
        alert("Không thể khởi tạo đăng nhập Google");
      });
  }
</script>
