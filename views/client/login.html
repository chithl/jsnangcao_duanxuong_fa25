<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="author" content="Untree.co" />
    <link rel="shortcut icon" href="../../assets/client/tintas-jotun-logo-png_seeklogo-140174.png" />

    <meta name="description"
        content="Khám phá các sản phẩm sơn và bộ sưu tập màu sắc mới nhất từ Jotun. Chất lượng vượt trội cho ngôi nhà của bạn." />
    <meta name="keywords" content="sơn jotun, màu sắc, nội thất, thiết kế, bootstrap" />

    <link rel="apple-touch-icon" href="../assets/client/img/apple-icon.png" />
    <link rel="shortcut icon" type="image/x-icon" href="../../assets/client/img/favicon.ico" />

    <link rel="stylesheet" href="../../assets/client/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../assets/client/css/templatemo.css" />
    <link rel="stylesheet" href="../../assets/client/css/custom.css" />

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;200;300;400;500;700;900&display=swap" />
    <link rel="stylesheet" href="../../assets/client/css/fontawesome.min.css" />
    <script src="https://www.w3schools.com/lib/w3.js"></script>
    <title>Sơn Jotun - Trang chủ</title>
</head>

<body>

    <!-- Menu -->
    <div w3-include-html="layouts/menu.html"></div>


    <!-- Bắt đầu body -->

    <main class="login-page">
        <div class="login-container">
            <h2>Đăng Nhập</h2>
            <form class="login-form">
                <div class="form-group">
                    <label for="username">Email</label>
                    <input type="email" id="email" name="email" placeholder="Nhập tên đăng nhập hoặc email">
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="Nhập mật khẩu">
                </div>
                <button type="submit" class="btn-login">Đăng Nhập</button>
                <div class="form-footer">
                    <a href="#" class="forgot-password">Quên mật khẩu?</a>
                    <span>|</span>
                    <a href="register.html" class="register-link">Đăng ký tài khoản mới</a>
                </div>
            </form>
        </div>
    </main>

    <!-- Kết thúc body -->


    <!-- Footer -->
    <div w3-include-html="layouts/footer.html"></div>

    <script>
        w3.includeHTML();
    </script>

    <script src="../../assets/client/js/jquery-1.11.0.min.js"></script>
    <script src="../../assets/client/js/jquery-migrate-1.2.1.min.js"></script>
    <script src="../../assets/client/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/client/js/templatemo.js"></script>
    <script src="../../assets/client/js/custom.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="../../controllers/ui/client/login.js"></script>
    <script type="module" src="../../assets/client/js/menu.js"></script>

</body>

</html>
