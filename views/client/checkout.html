<!DOCTYPE html>
<html lang="vi">

<head>
    <title>Thanh toán | Jotun Vietnam</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="apple-touch-icon" href="../assets/client/img/apple-icon.png" />
    <link rel="shortcut icon" type="image/x-icon" href="../../assets/client/img/favicon.ico" />

    <link rel="stylesheet" href="../../assets/client/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../assets/client/css/templatemo.css" />
    <link rel="stylesheet" href="../../assets/client/css/custom.css" />

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;200;300;400;500;700;900&display=swap" />
    <link rel="stylesheet" href="../../assets/client/css/fontawesome.min.css" />
    <script src="https://www.w3schools.com/lib/w3.js"></script>
</head>

<body>
    <!-- Start Menu -->
    <div w3-include-html="layouts/menu.html"></div>
    <!-- End Menu -->

    <!-- CHECKOUT -->
    <section class="container py-5">
        <h2 class="fw-bold mb-4">Thanh toán</h2>

        <div class="row g-4">
            <!-- LEFT -->
            <div class="col-lg-7">
                <!-- THÔNG TIN GIAO NHẬN -->
                <div class="bg-white rounded shadow-sm p-4 mb-4">
                    <h5 class="fw-bold mb-3">Thông tin giao nhận</h5>

                    <form action="http://localhost:8888/create_payment" method="post" id="checkout-form">
                        <input id="amount" type="hidden" name="amount" class="form-control" value="">
                        <input type="hidden" id="user_id" name="user_id" class="form-control" value="">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Họ và tên</label>
                                <div class="input-group">
                                    <input required id="fullname" name="receiver_name" type="text" class="form-control"
                                        placeholder="Nhập họ và tên">
                                </div>
                                <small id="fullname_error" class="text-danger"></small>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Số điện thoại</label>
                                <div class="input-group">
                                    <input required id="phone" name="receiver_phone" type="text" class="form-control"
                                        placeholder="Nhập số điện thoại">
                                </div>
                                <small id="phone_error" class="text-danger"></small>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" name="receiver_email" class="form-control"
                                placeholder="email@example.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Địa chỉ giao hàng</label>
                            <div class="input-group">
                                <input required name="receiver_address" id="address" type="text" class="form-control"
                                    placeholder="Số nhà, đường, phường/xã, quận/huyện, tỉnh/thành">
                            </div>
                            <small id="address_error" class="text-danger"></small>
                        </div>

                        <!-- PHƯƠNG THỨC THANH TOÁN -->
                        <div class="bg-white rounded shadow-sm p-4 mb-4">
                            <h5 class="fw-bold mb-3">Phương thức thanh toán</h5>

                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" name="payment" id="bank" value="bank" checked>
                                <label class="form-check-label" for="bank">
                                    🏦 Chuyển khoản ngân hàng (VNPay)
                                </label>
                            </div>

                            <small id="payments_error" class="text-danger"></small>
                        </div>

                        <button type="submit" class="btn btn-danger w-100 py-3 place-order-btn border-0">
                            Xác nhận đặt hàng
                        </button>
                    </form>
                </div>
            </div>

            <!-- RIGHT -->
            <div class="col-lg-5">
                <div class="bg-white rounded shadow-sm p-4">
                    <h5 class="fw-bold mb-3">Đơn hàng của bạn</h5>

                    <div id="checkout-items"></div>

                    <hr>

                    <div class="d-flex justify-content-between mb-2">
                        <span>Tạm tính</span>
                        <strong id="subtotal">0đ</strong>
                    </div>

                    <div class="d-flex justify-content-between mb-3">
                        <span>Phí vận chuyển</span>
                        <strong>Miễn phí</strong>
                    </div>

                    <div class="d-flex justify-content-between fw-bold fs-5 mb-3">
                        <span>Tổng cộng</span>
                        <span id="total">0đ</span>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <!-- Start Footer -->
    <div w3-include-html="layouts/footer.html"></div>
    <!-- End Footer -->
    <script>
        w3.includeHTML();
    </script>
    <!-- Start Script -->
    <script src="../../assets/client/js/jquery-1.11.0.min.js"></script>
    <script src="../../assets/client/js/jquery-migrate-1.2.1.min.js"></script>
    <script src="../../assets/client/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/client/js/templatemo.js"></script>
    <script src="../../assets/client/js/custom.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="../../controllers/ui/client/checkout.js"></script>
    <!-- End Script -->
</body>

</html>
