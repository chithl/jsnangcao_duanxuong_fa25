<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Liên hệ | Jotun Vietnam</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      rel="apple-touch-icon"
      href="../../assets/client/img/apple-icon.png"
    />
    <link
      rel="shortcut icon"
      type="image/x-icon"
      href="../../assets/client/img/favicon.ico"
    />

    <link rel="stylesheet" href="../../assets/client/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../assets/client/css/templatemo.css" />
    <link rel="stylesheet" href="../../assets/client/css/custom.css" />

    <!-- Load fonts style after rendering the layout styles -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;200;300;400;500;700;900&display=swap"
    />
    <link rel="stylesheet" href="../../assets/client/css/fontawesome.min.css" />

    <!-- Load map styles -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
      integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A=="
      crossorigin=""
    />
    <script src="https://www.w3schools.com/lib/w3.js"></script>
  </head>

  <body>
    <!-- Start Menu -->
    <div w3-include-html="layouts/menu.html"></div>
    <!-- End Menu -->

    <!-- Modal -->
    <div
      class="modal fade bg-white"
      id="templatemo_search"
      tabindex="-1"
      role="dialog"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg" role="document">
        <div class="w-100 pt-1 mb-5 text-right">
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Đóng"
          ></button>
        </div>
        <form
          action=""
          method="get"
          class="modal-content modal-body border-0 p-0"
        >
          <div class="input-group mb-2">
            <input
              type="text"
              class="form-control"
              id="inputModalSearch"
              name="q"
              placeholder="Tìm kiếm ..."
            />
            <button
              type="submit"
              class="input-group-text bg-success text-light"
            >
              <i class="fa fa-fw fa-search text-white"></i>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Start Content Page -->
    <div class="container-fluid bg-light py-5">
      <div class="col-md-6 m-auto text-center">
        <h1 class="h1">Liên Hệ Với Chúng Tôi</h1>
        <p>
          Xem các địa điểm của Jotun tại...
        </p>
      </div>
    </div>

    <!-- Start Map -->
    <div id="mapid" style="width: 100%; height: 300px"></div>
    <script
      src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"
      integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA=="
      crossorigin=""
    ></script>
    <script>
      // Thiết lập bản đồ và tọa độ ban đầu (Tọa độ này là của Rio de Janeiro, Brazil, trong template gốc)
      var mymap = L.map("mapid").setView([-23.013104, -43.394365, 13], 13);

      L.tileLayer(
        "https://api.mapbox.com/styles/v1/{id}/tiles/{z}/{x}/{y}?access_token=pk.eyJ1IjoibWFwYm94IiwiYSI6ImNpejY4NXVycTA2emYycXBndHRqcmZ3N3gifQ.rJcFIG214AriISLbB6B5aw",
        {
          maxZoom: 18,
          // Việt hóa phần thông tin bản quyền (attribution)
          attribution:
            'Zay Template | Thiết kế Template bởi <a href="https://templatemo.com/">Templatemo</a> | Dữ liệu bản đồ &copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors, ' +
            '<a href="https://creativecommons.org/licenses/by-sa/2.0/">CC-BY-SA</a>, ' +
            'Ảnh &copy; <a href="https://www.mapbox.com/">Mapbox</a>',
          id: "mapbox/streets-v11",
          tileSize: 512,
          zoomOffset: -1,
        }
      ).addTo(mymap);

      // Đặt marker và popup tại vị trí
      L.marker([-23.013104, -43.394365, 13])
        .addTo(mymap)
        // Việt hóa nội dung popup
        .bindPopup("<b>Zay</b> Mẫu Thương Mại Điện Tử<br />Vị trí.")
        .openPopup();

      // Vô hiệu hóa tính năng zoom bằng chuột và cảm ứng
      mymap.scrollWheelZoom.disable();
      mymap.touchZoom.disable();
    </script>
    <!-- Ena Map -->

    <!-- Start Contact -->
    <div class="container py-5">
      <div class="row py-5">
        <form class="col-md-9 m-auto" method="post" role="form">
          <div class="row">
            <div class="form-group col-md-6 mb-3">
              <label for="inputname">Họ và Tên</label>
              <input
                type="text"
                class="form-control mt-1"
                id="name"
                name="name"
                placeholder="Họ và Tên"
              />
            </div>
            <div class="form-group col-md-6 mb-3">
              <label for="inputemail">Email</label>
              <input
                type="email"
                class="form-control mt-1"
                id="email"
                name="email"
                placeholder="Email"
              />
            </div>
          </div>
          <div class="mb-3">
            <label for="inputsubject">Chủ đề</label>
            <input
              type="text"
              class="form-control mt-1"
              id="subject"
              name="subject"
              placeholder="Chủ đề"
            />
          </div>
          <div class="mb-3">
            <label for="inputmessage">Tin nhắn</label>
            <textarea
              class="form-control mt-1"
              id="message"
              name="message"
              placeholder="Nội dung Tin nhắn"
              rows="8"
            ></textarea>
          </div>
          <div class="row">
            <div class="col text-end mt-2">
              <button type="submit" class="btn btn-success btn-lg px-3">
                Gửi Tin Nhắn
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
    <!-- End Contact -->

    <!-- Start Footer -->
    <div w3-include-html="layouts/footer.html"></div>
    <!-- End Footer -->
    <script>
      w3.includeHTML();
    </script>

    <!-- Start Script -->
    <script src="../../assets/client/js/jquery-1.11.0.min.js"></script>
    <script src="../../assets/client/js/jquery-migrate-1.2.1.min.js"></script>
    <script src="../../assets/client/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/client/js/templatemo.js"></script>
    <script src="../../assets/client/js/custom.js"></script>
    <script type="module" src="../../assets/client/js/menu.js"></script>

    <!-- End Script -->
  </body>
</html>
