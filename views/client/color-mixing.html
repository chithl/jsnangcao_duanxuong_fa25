<!DOCTYPE html>
<html lang="vi">

<head>
    <title>Trang chủ | Jotun Vietnam</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="apple-touch-icon" href="../assets/client/img/apple-icon.png" />
    <link rel="shortcut icon" type="image/x-icon" href="../../assets/client/img/favicon.ico" />

    <link rel="stylesheet" href="../../assets/client/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../assets/client/css/templatemo.css" />
    <link rel="stylesheet" href="../../assets/client/css/custom.css" />

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;200;300;400;500;700;900&display=swap" />
    <link rel="stylesheet" href="../../assets/client/css/fontawesome.min.css" />
    <script src="https://www.w3schools.com/lib/w3.js"></script>
</head>

<body>
    <!-- Start Menu -->
    <div w3-include-html="layouts/menu.html"></div>
    <!-- End Menu -->

    <!-- Content -->
    <section class="container py-5">
        <h2 class="fw-bold mb-4">Công cụ pha màu sơn</h2>

        <!-- Gallery Công Thức Pha Sẵn Có -->
        <div class="mb-5">
            <h5 class="fw-bold mb-3">Công thức pha sẵn có</h5>
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <input type="text" class="form-control" id="formula-search" placeholder="Tìm kiếm màu, code...">
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="formula-palette-filter">
                        <option value="">Tất cả bảng màu</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="formula-base-filter">
                        <option value="">Tất cả base</option>
                    </select>
                </div>
            </div>

            <div id="formulas-gallery" class="row g-3">
                <!-- Công thức sẽ được load ở đây -->
            </div>
        </div>

        <hr class="my-5">

        <div class="row g-4">

            <!-- LEFT -->
            <div class="col-lg-6">
                <div class="bg-white p-4 rounded shadow-sm">

                    <h5 class="fw-bold mb-3">Tùy chỉnh & Tính toán</h5>

                    <!-- Hiển thị màu đã chọn từ công thức -->
                    <div id="selected-formula-info" class="alert alert-info d-none mb-3">
                        <p class="mb-1"><strong>Công thức:</strong> <span id="selected-formula-name">-</span></p>
                        <p class="mb-0"><strong>Mã:</strong> <span id="selected-formula-code">-</span> | 
                               <strong>Base:</strong> <span id="selected-formula-base">-</span></p>
                    </div>

                    <!-- QUICK CALC -->
                    <div class="mb-3">
                        <label class="form-label">Dung tích pha (L)</label>
                        <input type="number" class="form-control" id="volume-input" placeholder="VD: 5" min="0.1" step="0.1" value="1">
                    </div>

                    <button class="btn btn-danger w-100" id="btn-calculate" onclick="calculateMix()">
                        Tính pha màu
                    </button>

                </div>
            </div>

            <!-- RIGHT -->
            <div class="col-lg-6">
                <div class="bg-white p-4 rounded shadow-sm">

                    <h5 class="fw-bold mb-3">Kết quả mô phỏng</h5>

                    <div id="result-container" class="d-none">
                        <div class="border rounded mb-3 p-3" style="height:120px;" id="color-preview"></div>

                        <h6 class="fw-bold">Tỉ lệ pha (cho <span id="result-volume">0</span>L)</h6>
                        <table class="table table-sm table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>Thành phần</th>
                                    <th class="text-end">Lượng (ml)</th>
                                    <th class="text-end">Chi phí</th>
                                </tr>
                            </thead>
                            <tbody id="mix-table">
                            </tbody>
                        </table>

                        <div class="alert alert-info" id="mix-summary"></div>
                    </div>

                    <div id="empty-state" class="text-center text-muted py-5">
                        <p>Chọn công thức từ bên trái để bắt đầu</p>
                    </div>

                </div>
            </div>

        </div>
    </section>
    <!-- End Content -->

    <!-- Start Footer -->
    <div w3-include-html="layouts/footer.html"></div>
    <!-- End Footer -->
    <script>
        w3.includeHTML();
    </script>
    <!-- Start Script -->
    <script src="../../assets/client/js/jquery-1.11.0.min.js"></script>
    <script src="../../assets/client/js/jquery-migrate-1.2.1.min.js"></script>
    <script src="../../assets/client/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/client/js/templatemo.js"></script>
    <script src="../../assets/client/js/custom.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="../../controllers/ui/client/color-mixing.js"></script>
    <!-- End Script -->
</body>

</html>
