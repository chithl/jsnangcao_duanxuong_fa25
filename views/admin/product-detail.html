<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Chi tiết sản phẩm | Sơn Jotun</title>
    <link rel="icon" href="favicon.ico" />
    <link href="../../assets/admin/styles/style.css" rel="stylesheet" />
    <style>
      .badge-active {
        background: #ecfdf3;
        color: #15803d;
      }
      .badge-inactive {
        background: #fef2f2;
        color: #b91c1c;
      }
      .stat-label {
        color: #6b7280;
        font-size: 12px;
      }
      .stat-value {
        color: #111827;
        font-weight: 600;
      }
      .swatch {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        border: 1px solid #e5e7eb;
      }
    </style>
    <script src="https://www.w3schools.com/lib/w3.js"></script>
  </head>

  <body
    x-data="{ page: 'productDetail', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}"
  >
    <div
      x-show="loaded"
      x-init="window.addEventListener('DOMContentLoaded', () => {setTimeout(() => loaded = false, 500)})"
      class="fixed left-0 top-0 z-999999 flex h-screen w-screen items-center justify-center bg-white dark:bg-black"
    >
      <div
        class="h-16 w-16 animate-spin rounded-full border-4 border-solid border-brand-500 border-t-transparent"
      ></div>
    </div>

    <div class="flex h-screen overflow-hidden">
      <div w3-include-html="layouts/sidebar.html"></div>

      <div
        class="relative flex flex-1 flex-col overflow-x-hidden overflow-y-auto"
      >
        <div
          @click="sidebarToggle = false"
          :class="sidebarToggle ? 'block lg:hidden' : 'hidden'"
          class="fixed w-full h-screen z-9 bg-gray-900/50"
        ></div>
        <div w3-include-html="layouts/header.html"></div>
        <main>
          <div class="mx-auto max-w-(--breakpoint-2xl) p-4 md:p-6">
            <div class="mb-6 flex flex-wrap items-center justify-between gap-3">
              <div>
                <h2
                  class="text-xl font-semibold text-gray-800 dark:text-white/90"
                >
                  Chi tiết sản phẩm
                </h2>
                <nav>
                  <ol
                    class="flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400"
                  >
                    <li>
                      <a
                        class="inline-flex items-center gap-1.5"
                        href="index.html"
                      >
                        Trang chủ
                        <svg
                          class="stroke-current"
                          width="17"
                          height="16"
                          viewBox="0 0 17 16"
                          fill="none"
                          xmlns="http://www.w3.org/2000/svg"
                        >
                          <path
                            d="M6.0765 12.667L10.2432 8.50033L6.0765 4.33366"
                            stroke=""
                            stroke-width="1.2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                          />
                        </svg>
                      </a>
                    </li>
                    <li>Chi tiết sản phẩm</li>
                  </ol>
                </nav>
              </div>
              <div class="flex gap-2">
                <a
                  href="products.html"
                  class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50"
                  >Quay lại</a
                >
                <a
                  id="edit-link"
                  href="#"
                  class="rounded-lg bg-brand-500 px-4 py-2 text-sm font-medium text-white hover:bg-brand-600"
                  >Chỉnh sửa</a
                >
              </div>
            </div>

            <div class="space-y-6">
              <!-- Cột trái: Thông tin sản phẩm + Hình ảnh -->
              <!-- Ảnh trái - Thông tin phải -->
              <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div
                  class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
                >
                  <div
                    class="border-b border-gray-100 px-5 py-4 dark:border-gray-800 sm:px-6 sm:py-5 flex items-center justify-between"
                  >
                    <h3
                      class="text-base font-medium text-gray-800 dark:text-white/90"
                    >
                      Thông tin cơ bản
                    </h3>
                    <span
                      id="status-badge"
                      class="rounded-full px-3 py-1 text-xs font-semibold rounded px-3 py-1.5"
                    ></span>
                  </div>

                  <div class="p-5 sm:p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="mb-3">
                      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tên sản phẩm</label>
                      <input type="text" id="product-name" readonly class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 dark:bg-gray-800 dark:border-gray-700 text-gray-900 dark:text-white" />
                    </div>
                    <div class="mb-3">
                      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">SKU</label>
                      <input type="text" id="product-sku" readonly class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 dark:bg-gray-800 dark:border-gray-700 text-gray-900 dark:text-white" />
                    </div>
                    <div class="mb-3">
                      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Thương hiệu</label>
                      <input type="text" id="product-brand" readonly class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 dark:bg-gray-800 dark:border-gray-700 text-gray-900 dark:text-white" />
                    </div>
                    <div class="mb-3">
                      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Dòng sản phẩm</label>
                      <input type="text" id="product-line" readonly class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 dark:bg-gray-800 dark:border-gray-700 text-gray-900 dark:text-white" />
                    </div>
                    <div class="mb-3">
                      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Segment</label>
                      <input type="text" id="product-segment" readonly class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 dark:bg-gray-800 dark:border-gray-700 text-gray-900 dark:text-white" />
                    </div>
                  </div>
                </div>

                <div
                  class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
                >
                  <div
                    class="border-b border-gray-100 px-5 py-4 dark:border-gray-800 sm:px-6 sm:py-5"
                  >
                    <h3
                      class="text-base font-medium text-gray-800 dark:text-white/90"
                    >
                      Thông tin kỹ thuật
                    </h3>
                  </div>

                  <div class="p-5 sm:p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="mb-3">
                      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Finish</label>
                      <input type="text" id="product-finish" readonly class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 dark:bg-gray-800 dark:border-gray-700 text-gray-900 dark:text-white" />
                    </div>
                    <div class="mb-3">
                      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Base</label>
                      <input type="text" id="product-base" readonly class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 dark:bg-gray-800 dark:border-gray-700 text-gray-900 dark:text-white" />
                    </div>
                    <div class="mb-3">
                      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Độ phủ (m²/L)</label>
                      <input type="text" id="product-cover" readonly class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 dark:bg-gray-800 dark:border-gray-700 text-gray-900 dark:text-white" />
                    </div>
                    <div class="mb-3">
                      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tags</label>
                      <input type="text" id="product-tags" readonly class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 dark:bg-gray-800 dark:border-gray-700 text-gray-900 dark:text-white" />
                    </div>
                    <div class="mb-3">
                      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Ngày tạo</label>
                      <input type="text" id="product-created" readonly class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50 dark:bg-gray-800 dark:border-gray-700 text-gray-900 dark:text-white" />
                    </div>
                  </div>
                </div>
              </div>

              <div
                class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
              >
                  <div
                    class="border-b border-gray-100 px-5 py-4 dark:border-gray-800 sm:px-6 sm:py-5"
                  >
                    <h3
                      class="text-base font-medium text-gray-800 dark:text-white/90"
                    >
                      Hình ảnh
                    </h3>
                  </div>
                  <div class="p-5 sm:p-6">
                    <div id="product-images" class="flex gap-3"></div>
                    <p id="image-empty" class="text-sm text-gray-500">
                      Chưa có ảnh.
                    </p>
                  </div>
                </div>
              </div>

              <!-- Biến thể -->
              <div
                class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
              >
                <div
                  class="border-b border-gray-100 px-5 py-4 dark:border-gray-800 sm:px-6 sm:py-5 flex items-center justify-between"
                >
                  <h3
                    class="text-base font-medium text-gray-800 dark:text-white/90"
                  >
                    Biến thể
                  </h3>
                  <div class="flex items-center gap-3">
                    <span
                      id="variant-count"
                      class="text-sm text-gray-500"
                    ></span>
                    <a
                      id="add-variant-btn"
                      href="#"
                      class="inline-flex items-center justify-center rounded-lg bg-brand-500 px-3 py-1.5 text-sm font-medium text-white hover:bg-brand-600"
                    >
                      <svg
                        class="w-4 h-4 mr-1"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M12 4v16m8-8H4"
                        ></path>
                      </svg>
                      Thêm biến thể
                    </a>
                  </div>
                </div>
                <div class="p-5 sm:p-6">
                  <div
                    class="overflow-hidden rounded-xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]"
                  >
                    <div class="max-w-full overflow-x-auto">
                      <table class="min-w-full text-sm">
                        <thead>
                          <tr
                            class="border-b border-gray-100 dark:border-gray-800 text-gray-500"
                          >
                            <!-- <th class="px-4 py-3 text-left">ID</th> -->
                            <th class="px-4 py-3 text-left">Product ID</th>
                            <th class="px-4 py-3 text-left">SKU</th>
                            <th class="px-4 py-3 text-left">Dung tích (L)</th>
                            <th class="px-4 py-3 text-left">Giá bán</th>
                            <th class="px-4 py-3 text-left">Ngày tạo</th>
                            <th class="px-4 py-3 text-left">Palettes</th>
                            <th class="px-4 py-3 text-left">Màu mẫu</th>
                            <th class="px-4 py-3 text-left">Trạng thái</th>
                            <th class="px-4 py-3 text-left">Hành động</th>
                          </tr>
                        </thead>
                        <tbody
                          id="variant-table"
                          class="divide-y divide-gray-100 dark:divide-gray-800"
                        ></tbody>
                      </table>
                    </div>
                  </div>
                  <p
                    id="variant-empty"
                    class="mt-3 text-sm text-gray-500 hidden"
                  >
                    Chưa có biến thể
                  </p>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script>
      w3.includeHTML();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>

    <script defer src="../../assets/admin/scripts/bundle.js"></script>
    <script
      type="module"
      src="../../controllers/ui/admin/product/detail.js"
    ></script>
  </body>
</html>
