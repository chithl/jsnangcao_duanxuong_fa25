<!  doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Thêm Màu | Sơn Jotun</title>
    <link rel="icon" href="favicon.ico">
    <link href="../../assets/admin/styles/style.css" rel="stylesheet">
    <script src="https://www.w3schools.com/lib/w3.js"></script>
</head>

<body x-data="{ page: 'addColor', loaded: true, darkMode: false, stickyMenu: false, sidebarToggle: false }" x-init="
        darkMode = JSON.parse(localStorage.getItem('darkMode'));
        $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))
    " : class="{'dark bg-gray-900':   darkMode === true}">

    <!-- Loading -->
    <div x-show="loaded"
        x-init="window.addEventListener('DOMContentLoaded', () => { setTimeout(() => loaded = false, 500) })"
        class="fixed inset-0 z-999999 flex items-center justify-center bg-white dark:bg-black">
        <div class="h-16 w-16 animate-spin rounded-full border-4 border-brand-500 border-t-transparent"></div>
    </div>

    <div class="flex h-screen overflow-hidden">
        <div w3-include-html="layouts/sidebar.html"></div>

        <div class="relative flex flex-1 flex-col overflow-x-hidden overflow-y-auto">
            <div @click="sidebarToggle = false" : class="sidebarToggle ? 'block lg:hidden' : 'hidden'"
                class="fixed inset-0 z-9 bg-gray-900/50"></div>

            <div w3-include-html="layouts/header.html"></div>

            <main>
                <div class="mx-auto max-w-(--breakpoint-2xl) p-4 md:p-6">

                    <!-- Page title -->
                    <div x-data="{ pageName: 'Thêm Màu' }">
                        <div class="mb-6 flex flex-wrap items-center justify-between gap-3">
                            <h2 class="text-xl font-semibold text-gray-800 dark:text-white/90" x-text="pageName"></h2>

                            <nav>
                                <ol class="flex items-center gap-1.  5">
                                    <li>
                                        <a href="index.html"
                                            class="inline-flex items-center gap-1.  5 text-sm text-gray-500 dark: text-gray-400">
                                            Trang chủ
                                            <svg class="stroke-current" width="17" height="16" viewBox="0 0 17 16"
                                                fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path d="M6.  0765 12. 667L10.2432 8.50033L6.0765 4.33366"
                                                    stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
                                            </svg>
                                        </a>
                                    </li>
                                    <li class="text-sm text-gray-800 dark:text-white/90" x-text="pageName"></li>
                                </ol>
                            </nav>
                        </div>
                    </div>

                    <!-- Form -->
                    <div class="grid grid-cols-1 gap-6">
                        <form id="add-color">
                            <div
                                class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]">

                                <div class="flex items-center justify-between px-5 py-4 sm:px-6 sm:py-5">
                                    <h3 class="text-base font-medium text-gray-800 dark:text-white/90">
                                        Thêm Màu
                                    </h3>

                                    <a href="colors.html"
                                        class="inline-flex items-center gap-1.  5 rounded-lg bg-brand-500 px-4 py-2 text-sm font-medium text-white hover:bg-brand-600">
                                        Quay lại
                                    </a>
                                </div>

                                <div class="space-y-6 border-t border-gray-100 p-5 sm:p-6 dark:border-gray-800">

                                    <!-- Bảng Màu -->
                                    <div>
                                        <label
                                            class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">
                                            Bảng Màu <span class="text-error-500">*</span>
                                        </label>
                                        <select name="palette_id" id="palette_id"
                                            class="dark:bg-dark-900 shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark: focus:border-brand-800 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 focus:ring-3 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90"
                                            >
                                            <option value="">-- Chọn bảng màu --</option>
                                        </select>
                                        <small id="error-palette_id" class="mt-1 block text-sm text-error-500 hidden"></small>
                                    </div>

                                    <!-- Mã Code -->
                                    <div>
                                        <label
                                            class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">
                                            Mã Màu <span class="text-error-500">*</span>
                                        </label>
                                        <input type="text" name="code" id="code" placeholder="vd: B003"
                                            class="dark:bg-dark-900 shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 placeholder:text-gray-400 focus:ring-3 focus:  outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
                                            >
                                        <small id="error-code" class="mt-1 block text-sm text-error-500 hidden"></small>
                                    </div>

                                    <!-- Tên Màu -->
                                    <div>
                                        <label
                                            class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">
                                            Tên Màu <span class="text-error-500">*</span>
                                        </label>
                                        <input type="text" name="name" id="name" placeholder="vd:   Soft Beige"
                                            class="dark:bg-dark-900 shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 placeholder:text-gray-400 focus:ring-3 focus: outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30"
                                            >
                                        <small id="error-name" class="mt-1 block text-sm text-error-500 hidden"></small>
                                    </div>

                                    <!-- Mã HEX -->
                                    <div>
                                        <label
                                            class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">
                                            Mã HEX
                                        </label>
                                        <div class="flex gap-3">
                                            <input type="text" name="hex" id="hex" placeholder="#E8DBC7"
                                                class="dark:bg-dark-900 shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark: focus:border-brand-800 h-11 flex-1 rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 placeholder:text-gray-400 focus:ring-3 focus: outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30">
                                            <div class="flex h-11 w-11 items-center justify-center rounded-lg border border-gray-300 dark:border-gray-700">
                                                <input type="color" id="hex-picker" value="#E8DBC7" class="h-8 w-8 cursor-pointer rounded border-0">
                                            </div>
                                        </div>
                                        <small id="error-hex" class="mt-1 block text-sm text-error-500 hidden"></small>
                                    </div>

                                    <!-- Base Khuyến Nghị -->
                                    <div>
                                        <label
                                            class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">
                                            Base Khuyến Nghị
                                        </label>
                                        <select name="base" id="base"
                                            class="dark: bg-dark-900 shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 focus: ring-3 focus:outline-hidden dark:border-gray-700 dark:bg-gray-900 dark:text-white/90">
                                            <option value="">-- Chọn base --</option>
                                            <option value="A">A</option>
                                            <option value="B">B</option>
                                            <option value="C">C</option>
                                            <option value="D">D</option>
                                        </select>
                                        <small id="error-base" class="mt-1 block text-sm text-error-500 hidden"></small>
                                    </div>

                                </div>

                                <!-- Submit -->
                                <div
                                    class="flex items-center justify-end border-t border-gray-100 px-5 py-4 sm:px-6 sm:py-5 dark:border-gray-800">
                                    <button type="submit"
                                        class="shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 flex h-11 items-center justify-center rounded-lg border border-transparent bg-brand-500 px-4 py-2.5 text-sm font-medium text-white transition duration-300 ease-out hover:bg-brand-600 focus:ring-3 focus:outline-hidden dark: bg-brand-600 dark:hover:bg-brand-700 dark:focus:border-brand-800">
                                        Xác nhận
                                    </button>
                                </div>

                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script> w3.includeHTML(); </script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script defer src="../../assets/admin/scripts/bundle.js"></script>
    <script type="module" src="../../controllers/ui/admin/color/color/add.js"></script>
    
    <script>
        // Sync color picker with hex input
        document.addEventListener('DOMContentLoaded', () => {
            const hexInput = document.getElementById('hex');
            const hexPicker = document.getElementById('hex-picker');
            
            if (hexInput && hexPicker) {
                hexInput.addEventListener('input', (e) => {
                    if (e.target.value.match(/^#[0-9A-F]{6}$/i)) {
                        hexPicker.value = e. target.value;
                    }
                });
                
                hexPicker.addEventListener('input', (e) => {
                    hexInput.value = e.target. value. toUpperCase();
                });
            }
        });
    </script>

</body>

</html>
