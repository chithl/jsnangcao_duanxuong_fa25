<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="author" content="Untree.co" />
    <link rel="shortcut icon" href="../../assets/client/tintas-jotun-logo-png_seeklogo-140174.png" />

    <meta name="description"
        content="Khám phá các sản phẩm sơn và bộ sưu tập màu sắc mới nhất từ Jotun. Chất lượng vượt trội cho ngôi nhà của bạn." />
    <meta name="keywords" content="sơn jotun, màu sắc, nội thất, thiết kế, bootstrap" />

    <link href="../../assets/client/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />
    <link href="../../assets/client/css/tiny-slider.css" rel="stylesheet" />
    <link href="../../assets/client/css/style.css" rel="stylesheet" />
    <script src="https://www.w3schools.com/lib/w3.js"></script>
    <title>Sơn Jotun - Trang chủ</title>
</head>

<body>

    <!-- Menu -->
    <div w3-include-html="layouts/menu.html"></div>


    <!-- Bắt đầu body -->

    <main class="register-page">
        <div class="register-container">
            <h2>Đăng Ký</h2>
            <form class="register-form">
                <div class="form-group">
                    <label for="fullname">Họ và Tên</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Nhập họ và tên của bạn" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Nhập địa chỉ email" required>
                </div>
                <div class="form-group">
                    <label for="reg_password">Mật khẩu</label>
                    <input type="password" id="reg_password" name="reg_password" placeholder="Tạo mật khẩu" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Xác nhận Mật khẩu</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Xác nhận mật khẩu"
                        required>
                </div>
                <button type="submit" class="btn-register">Đăng Ký Ngay</button>
                <div class="form-footer">
                    <span>Đã có tài khoản?</span>
                    <a href="login.html" class="login-link">Đăng nhập tại đây</a>
                </div>
            </form>
        </div>
    </main>

    <!-- Kết thúc body -->


    <!-- Footer -->
    <div w3-include-html="layouts/footer.html"></div>

    <script>
        w3.includeHTML();
    </script>

    <script src="../../assets/client/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/client/js/tiny-slider.js"></script>
    <script src="../../assets/client/js/custom.js"></script>
</body>

</html>
