<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Thêm Biến Thể | Sơn Jotun</title>
    <link rel="icon" href="favicon.ico">
    <link href="../../assets/admin/styles/style.css" rel="stylesheet">
    <style>
        .error-message { color: #ef4444; font-size: 12px; display: block; }
        .color-preview { width: 48px; height: 48px; border-radius: 8px; border: 2px solid #e5e7eb; }
    </style>
    <script src="https://www.w3schools.com/lib/w3.js"></script>
    <script type="module" src="../../assets/admin/scripts/blockClient.js"></script>
</head>

<body
    x-data="{ page: 'addVariant', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-900': darkMode === true}">
    <div x-show="loaded"
        x-init="window.addEventListener('DOMContentLoaded', () => {setTimeout(() => loaded = false, 500)})"
        class="fixed left-0 top-0 z-999999 flex h-screen w-screen items-center justify-center bg-white dark:bg-black">
        <div class="h-16 w-16 animate-spin rounded-full border-4 border-solid border-brand-500 border-t-transparent">
        </div>
    </div>

    <div class="flex h-screen overflow-hidden">
        <div w3-include-html="layouts/sidebar.html"></div>

        <div class="relative flex flex-1 flex-col overflow-x-hidden overflow-y-auto">
            <div @click="sidebarToggle = false" :class="sidebarToggle ? 'block lg:hidden' : 'hidden'"
                class="fixed w-full h-screen z-9 bg-gray-900/50"></div>
            <div w3-include-html="layouts/header.html"></div>
            <main>
                <div class="mx-auto max-w-(--breakpoint-2xl) p-4 md:p-6">
                    <div x-data="{ pageName: `Thêm Biến Thể`}">
                        <div class="mb-6 flex flex-wrap items-center justify-between gap-3">
                            <h2 class="text-xl font-semibold text-gray-800 dark:text-white/90" x-text="pageName"></h2>

                            <nav>
                                <ol class="flex items-center gap-1.5">
                                    <li>
                                        <a class="inline-flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400"
                                            href="index.html">
                                            Trang chủ
                                            <svg class="stroke-current" width="17" height="16" viewBox="0 0 17 16"
                                                fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path d="M6.0765 12.667L10.2432 8.50033L6.0765 4.33366" stroke=""
                                                    stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
                                            </svg>
                                        </a>
                                    </li>
                                    <li class="text-sm text-gray-800 dark:text-white/90" x-text="pageName"></li>
                                </ol>
                            </nav>
                        </div>
                    </div>
                    <form id="add-variant">
                        <input type="hidden" id="product_id" name="product_id" />
                        <div class="grid grid-cols-1 gap-6 xl:grid-cols-2">
                            <!-- Cột trái: Thông tin cơ bản -->
                            <div class="space-y-6">
                                <div class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]">
                                    <div class="border-b border-gray-100 px-5 py-4 dark:border-gray-800 sm:px-6 sm:py-5">
                                        <h3 class="text-base font-medium text-gray-800 dark:text-white/90">Thông tin biến thể</h3>
                                    </div>
                                    <div class="p-5 space-y-6 sm:p-6">
                                        <div>
                                            <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">
                                                Sản phẩm
                                            </label>
                                            <input type="text" id="product_name" readonly
                                                class="dark:bg-dark-900 shadow-theme-xs h-11 w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-800 bg-gray-50"
                                                placeholder="Đang tải..." />
                                        </div>

                                        <div>
                                            <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400 hidden">
                                                SKU <span class="text-error-500">*</span>
                                            </label>
                                            <input type="text" name="sku" id="sku"
                                                class="dark:bg-dark-900 shadow-theme-xs h-11 w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-800 hidden"
                                                placeholder="Nhập SKU biến thể" required/>
                                          
                                        </div>

                                        <div>
                                            <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">
                                                Dung tích (Lít) <span class="text-error-500">*</span>
                                            </label>
                                            <input type="number" name="size_L" id="size_L"
                                                class="dark:bg-dark-900 shadow-theme-xs h-11 w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-800"
                                                placeholder="Nhập dung tích" min="0" step="0.1" required/>
                                            <small class="error-message hidden mt-1"></small>
                                        </div>

                                        <div>
                                            <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">
                                                Giá bán <span class="text-error-500">*</span>
                                            </label>
                                            <input type="number" name="price" id="price"
                                                class="dark:bg-dark-900 shadow-theme-xs h-11 w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-800"
                                                placeholder="Nhập giá bán" min="0" step="1000" required/>
                                            <small class="error-message hidden mt-1"></small>
                                        </div>

                                        <div>
                                            <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">
                                                Số lượng tồn kho <span class="text-error-500">*</span>
                                            </label>
                                            <input type="number" name="quantity" id="quantity"
                                                class="dark:bg-dark-900 shadow-theme-xs h-11 w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-800"
                                                placeholder="Nhập số lượng" min="0" value="0" required/>
                                            <small class="error-message hidden mt-1"></small>
                                        </div>

                                        <div>
                                            <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">
                                                Màu mẫu (Hex) <span class="text-error-500">*</span>
                                            </label>
                                            <div class="flex gap-3 items-center">
                                                <input type="text" name="hex_preview" id="hex_preview"
                                                    class="dark:bg-dark-900 shadow-theme-xs h-11 flex-1 rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-800"
                                                    placeholder="#FFFFFF" pattern="^#[0-9A-Fa-f]{6}$" required/>
                                                <div id="color-preview" class="color-preview" style="background: #ffffff;"></div>
                                            </div>
                                            <small class="error-message hidden mt-1"></small>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Cột phải: Thông tin bổ sung -->
                            <div class="space-y-6">
                                <div class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03]">
                                    <div class="border-b border-gray-100 px-5 py-4 dark:border-gray-800 sm:px-6 sm:py-5">
                                        <h3 class="text-base font-medium text-gray-800 dark:text-white/90">Bảng màu & Trạng thái</h3>
                                    </div>
                                    <div class="p-5 space-y-6 sm:p-6">
                                        <div>
                                            <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">
                                                Bảng màu tương thích <span class="text-error-500">*</span>
                                            </label>
                                            <textarea name="supported_palettes" id="supported_palettes" rows="3"
                                                class="dark:bg-dark-900 shadow-theme-xs w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-800"
                                                placeholder="Nhập ID bảng màu, mỗi cái cách nhau bởi dấu phẩy (pal_basic, pal_premium)" required></textarea>
                                            <small class="error-message hidden mt-1"></small>
                                        </div>

                                        <div>
                                            <label class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-400">
                                                Trạng thái <span class="text-error-500">*</span>
                                            </label>
                                            <div class="relative z-20 bg-transparent">
                                                <select id="is_active" name="is_active"
                                                    class="dark:bg-dark-900 shadow-theme-xs h-11 w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-800" required>
                                                    <option value="">Vui lòng chọn trạng thái</option>
                                                    <option value="1" selected>Đang bán</option>
                                                    <option value="0">Ngừng bán</option>
                                                </select>
                                                <small class="error-message hidden mt-1"></small>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center justify-end gap-3 mt-6 border-t border-gray-100 p-5 sm:p-6 dark:border-gray-800">
                            <a id="cancel-btn" href="#"
                                class="rounded-lg border border-gray-300 bg-white px-5 py-2.5 text-sm font-medium text-gray-700 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-300">
                                Hủy bỏ
                            </a>
                            <button id="button_submit" type="button"
                                class="shadow-theme-xs focus:border-brand-300 focus:ring-brand-500/10 dark:focus:border-brand-800 flex h-11 items-center justify-center rounded-lg border border-transparent bg-brand-500 px-4 py-2.5 text-sm font-medium text-white transition duration-300 ease-out hover:bg-brand-600 dark:bg-brand-600 dark:hover:bg-brand-700">
                                Thêm biến thể
                            </button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>
    <script>
        w3.includeHTML();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
    <script defer src="../../assets/admin/scripts/bundle.js"></script>
    
    <script type="module" src="../../controllers/ui/admin/variant/add.js"></script>
</body>
</html>
