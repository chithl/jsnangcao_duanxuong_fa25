<!DOCTYPE html>
<html lang="en">

<head>
  <title>Chi tiết | Jotun Vietnam</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="apple-touch-icon" href="../../assets/client/img/apple-icon.png" />
  <link rel="shortcut icon" type="image/x-icon" href="../../assets/client/img/favicon.ico" />

  <link rel="stylesheet" href="../../assets/client/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../../assets/client/css/templatemo.css" />
  <link rel="stylesheet" href="../../assets/client/css/custom.css" />

  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;200;300;400;500;700;900&display=swap" />
  <link rel="stylesheet" href="../../assets/client/css/fontawesome.min.css" />

  <link rel="stylesheet" type="text/css" href="../../assets/client/css/slick.min.css" />
  <link rel="stylesheet" type="text/css" href="../../assets/client/css/slick-theme.css" />
  <script src="https://www.w3schools.com/lib/w3.js"></script>

  <style>

  </style>
</head>

<body>
  <div w3-include-html="layouts/menu.html"></div>
  <section class="py-5">
    <div class="container">
      <div class="row g-5">
        <div class="col-lg-6">
          <div class="product-card-luxury p-2">
            <img class="img-fluid rounded-15 w-100" src="" id="product-detail-img"
              style="min-height: 500px; object-fit: cover; border-radius: 15px;" />
          </div>
        </div>

        <div class="col-lg-6">
          <div class="ps-lg-4">
  

            <h1 class="display-5 fw-bold mb-3" id="product-name" style="color: #2d3436;">Đang tải...</h1>

            <div class="d-flex align-items-center mb-4">
              <div class="price-tag me-3" id="variant-price">0 ₫</div>
              <span class="badge bg-soft-success text-success p-2 px-3" id="product-status"
                style="background: #e3fcef;">
                <i class="fas fa-check-circle me-1"></i> Còn hàng
              </span>
            </div>

            <div class="row mb-4">
              <div class="col-4">
                <div class="info-label">Hãng</div>
                <div class="fw-bold" id="product-brand">-</div>
              </div>
              <div class="col-4">
                <div class="info-label">Dòng</div>
                <div class="fw-bold" id="product-line">-</div>
              </div>
              <div class="col-4">
                <div class="info-label">Bề mặt</div>
                <div class="fw-bold" id="product-finish">-</div>
              </div>
            </div>

            <hr class="my-4 opacity-10">

            <div class="mb-4">
              <label class="info-label mb-3 d-block">Chọn dung tích sản phẩm</label>
              <div id="variant-container" class="d-flex flex-wrap gap-3">
              </div>
            </div>

            <div id="variant-info" style="display: none;" class="mb-4 animate__animated animate__fadeIn">
              <div class="p-3 rounded-12 bg-light border border-dashed">
                <small class="text-muted d-block">Mã định danh SKU</small>
                <span class="fw-mono text-dark" id="variant-sku"></span>
              </div>
            </div>

            <form id="cart-form">
              <input type="hidden" id="selected-variant-id" value="" />
              <div class="row g-3">
                <div class="col-md-12">
                  <button type="submit" id="btn-add-to-cart"
                    class="btn btn-luxury-buy btn-primary w-100 btn-lg shadow-sm" disabled>
                    <i class="fas fa-cart-plus me-2"></i> THÊM VÀO GIỎ HÀNG
                  </button>
                </div>
      
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>
  <section class="py-5 bg-light">
    <div class="container">
        <div class="review-luxury-container">
            <h2 class="fw-bold mb-5 text-center">Đánh Giá Từ Khách Hàng</h2>
            
            <div class="row g-5 mb-5">
                <div class="col-lg-4">
                  <div class="rating-summary-box p-4 text-center h-100 d-flex flex-column justify-content-center">
                    <h3 class="display-3 fw-bold mb-0" id="rating-average-value">0.0</h3>
                    <div class="fs-4 mb-2" id="rating-stars">
                      <i class="fas fa-star"></i>
                      <i class="fas fa-star"></i>
                      <i class="fas fa-star"></i>
                      <i class="fas fa-star"></i>
                      <i class="fas fa-star"></i>
                    </div>
                    <p class="text-muted small" id="rating-average-note">Chưa có đánh giá</p>
                        
                    <div class="mt-4 text-start rating-breakdown">
                      <div class="d-flex align-items-center mb-2">
                        <small class="me-2" style="width: 40px;">5 <i class="fas fa-star small"></i></small>
                        <div class="progress progress-luxury flex-grow-1">
                          <div class="progress-bar bg-success" data-rating-bar="5" style="width: 0%"></div>
                        </div>
                        <span class="ms-2 text-muted" data-rating-count="5">0</span>
                      </div>
                      <div class="d-flex align-items-center mb-2">
                        <small class="me-2" style="width: 40px;">4 <i class="fas fa-star small"></i></small>
                        <div class="progress progress-luxury flex-grow-1">
                          <div class="progress-bar bg-primary" data-rating-bar="4" style="width: 0%"></div>
                        </div>
                        <span class="ms-2 text-muted" data-rating-count="4">0</span>
                      </div>
                      <div class="d-flex align-items-center mb-2">
                        <small class="me-2" style="width: 40px;">3 <i class="fas fa-star small"></i></small>
                        <div class="progress progress-luxury flex-grow-1">
                          <div class="progress-bar bg-warning" data-rating-bar="3" style="width: 0%"></div>
                        </div>
                        <span class="ms-2 text-muted" data-rating-count="3">0</span>
                      </div>
                      <div class="d-flex align-items-center mb-2">
                        <small class="me-2" style="width: 40px;">2 <i class="fas fa-star small"></i></small>
                        <div class="progress progress-luxury flex-grow-1">
                          <div class="progress-bar bg-info" data-rating-bar="2" style="width: 0%"></div>
                        </div>
                        <span class="ms-2 text-muted" data-rating-count="2">0</span>
                      </div>
                      <div class="d-flex align-items-center mb-2">
                        <small class="me-2" style="width: 40px;">1 <i class="fas fa-star small"></i></small>
                        <div class="progress progress-luxury flex-grow-1">
                          <div class="progress-bar bg-danger" data-rating-bar="1" style="width: 0%"></div>
                        </div>
                        <span class="ms-2 text-muted" data-rating-count="1">0</span>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="col-lg-8">
                    <div class="ps-lg-4">
                        <h4 class="fw-bold mb-4">Gửi đánh giá của bạn</h4>
                        <form id="luxury-review-form">
                            <div class="mb-4">
                                <label class="small fw-bold text-muted mb-2 d-block">MỨC ĐỘ HÀI LÒNG</label>
                                <div class="star-rating-input fs-3 text-muted">
                                    <i class="far fa-star cursor-pointer" data-rating="1"></i>
                                    <i class="far fa-star cursor-pointer" data-rating="2"></i>
                                    <i class="far fa-star cursor-pointer" data-rating="3"></i>
                                    <i class="far fa-star cursor-pointer" data-rating="4"></i>
                                    <i class="far fa-star cursor-pointer" data-rating="5"></i>
                                    <input type="hidden" id="selected-rating" value="0">
                                </div>
                            </div>
                            <div id="review-auth-hint" class="text-danger small mb-3 d-none" role="alert"></div>
                            <div class="row g-3">
                                <div class="col-12">
                                <textarea id="review-comment" class="form-control border-0 bg-light p-3" rows="4" placeholder="Cảm nhận của bạn về sản phẩm... *" required style="border-radius: 15px;"></textarea>
                                </div>
                                <div class="col-md-6">
                                <input id="review-name" type="text" class="form-control border-0 bg-light p-3" placeholder="Họ và tên *" required style="border-radius: 12px;" readonly>
                                </div>
                                <div class="col-md-6">
                                <button id="review-submit-btn" type="submit" class="btn btn-dark w-100 h-100 fw-bold" style="border-radius: 12px; letter-spacing: 1px;" disabled>GỬI ĐÁNH GIÁ</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div id="comment-list-luxury" class="mt-5 pt-5 border-top">
              <p class="text-muted text-center mb-0 py-5">Đang tải bình luận...</p>
            </div>
        </div>
    </div>
</section>


  <div w3-include-html="layouts/footer.html"></div>
  <script>
    w3.includeHTML();
  </script>

<script src="../../assets/client/js/jquery-1.11.0.min.js"></script>
<script src="../../assets/client/js/jquery-migrate-1.2.1.min.js"></script>
<script src="../../assets/client/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/client/js/slick.min.js"></script> <script src="../../assets/client/js/templatemo.js"></script>
<script src="../../assets/client/js/custom.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>

<script type="module" src="../../controllers/ui/client/product/detail.js"></script>

</body>

</html>
