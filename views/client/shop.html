<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Cửa hàng | Jotun Vietnam</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      rel="apple-touch-icon"
      href="../../assets/client/img/apple-icon.png"
    />
    <link
      rel="shortcut icon"
      type="image/x-icon"
      href="../../assets/client/img/favicon.ico"
    />

    <link rel="stylesheet" href="../../assets/client/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../assets/client/css/templatemo.css" />
    <link rel="stylesheet" href="../../assets/client/css/custom.css" />

    <!-- Load fonts style after rendering the layout styles -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;200;300;400;500;700;900&display=swap"
    />
    <link rel="stylesheet" href="../../assets/client/css/fontawesome.min.css" />
    <script src="https://www.w3schools.com/lib/w3.js"></script>
  </head>

  <body>
    <!-- Start Menu -->
    <div w3-include-html="layouts/menu.html"></div>
    <!-- End Menu -->

    <!-- Modal -->
    <div
      class="modal fade bg-white"
      id="templatemo_search"
      tabindex="-1"
      role="dialog"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg" role="document">
        <div class="w-100 pt-1 mb-5 text-right">
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Đóng"
          ></button>
        </div>
        <form
          action=""
          method="get"
          class="modal-content modal-body border-0 p-0"
        >
          <div class="input-group mb-2">
            <input
              type="text"
              class="form-control"
              id="inputModalSearch"
              name="q"
              placeholder="Tìm kiếm ..."
            />
            <button
              type="submit"
              class="input-group-text bg-success text-light"
            >
              <i class="fa fa-fw fa-search text-white"></i>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Start Content -->
    <div class="container py-5">
      <div class="row">
        <div class="col-lg-3">
          <div class="category-panel rounded-4 shadow-sm border-0 bg-white h-100">
            <div class="p-4">
              <div class="d-flex align-items-center justify-content-between mb-3">
                <h1 class="h2 mb-0">Danh Mục</h1>
                <span class="small text-muted" id="category-current-name">Tất cả danh mục</span>
              </div>
              <div id="category-list" class="list-group list-group-flush category-list"></div>
            </div>
          </div>
        </div>
        <div class="col-lg-9">
          <div class="row">
            <div class="col-md-6">
              <ul class="list-inline shop-top-menu pb-3 pt-1">
                <li class="list-inline-item">
                  <a class="h3 text-dark text-decoration-none mr-3" href="#"
                    >Tất Cả</a
                  >
                </li>
                <li class="list-inline-item">
                  <a class="h3 text-dark text-decoration-none mr-3" href="#"
                    >Nội thất</a
                  >
                </li>
                <li class="list-inline-item">
                  <a class="h3 text-dark text-decoration-none" href="#">Ngoại thất</a>
                </li>
              </ul>
            </div>
            <div class="col-md-6 pb-4">
              <div class="d-flex">
                <select class="form-control">
                  <option>Nổi Bật</option>
                  <option>Sang trọng hiện đại</option>
                  <option>Cổ điển</option>
                </select>
              </div>
            </div>
          </div>

          <div class="row" id="product-list">
            
            
          </div>
          <div class="row">
            <div class="col-12">
              <nav aria-label="Danh sách trang">
                <ul
                  id="pagination-list"
                  class="pagination pagination-lg justify-content-end mb-0"
                ></ul>
              </nav>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- End Content -->

    <!-- Start Footer -->
    <div w3-include-html="layouts/footer.html"></div>
    <!-- End Footer -->
    <script>
      w3.includeHTML();
    </script>

    <!-- Start Script -->
    <script src="../../assets/client/js/jquery-1.11.0.min.js"></script>
    <script src="../../assets/client/js/jquery-migrate-1.2.1.min.js"></script>
    <script src="../../assets/client/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/client/js/templatemo.js"></script>
    <script src="../../assets/client/js/custom.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
    <script type="module" src="../../controllers/ui/client/product/list.js"></script>

    <!-- End Script -->
  </body>
</html>
