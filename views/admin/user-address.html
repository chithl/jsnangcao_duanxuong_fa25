<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>
    Thành phần Biểu mẫu | TailAdmin - Mẫu Bảng điều khiển Quản trị Tailwind CSS
  </title>
  <link rel="icon" href="favicon.ico">
  <link href="../../../assets/admin/styles/style.css" rel="stylesheet">
  <script src="https://www.w3schools.com/lib/w3.js"></script>
</head>

<body
  x-data="{ page: 'formElements', 'loaded': true, 'darkMode': false, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
  x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
  :class="{'dark bg-gray-900': darkMode === true}">
  <div x-show="loaded"
    x-init="window.addEventListener('DOMContentLoaded', () => {setTimeout(() => loaded = false, 500)})"
    class="fixed left-0 top-0 z-999999 flex h-screen w-screen items-center justify-center bg-white dark:bg-black">
    <div class="h-16 w-16 animate-spin rounded-full border-4 border-solid border-brand-500 border-t-transparent">
    </div>
  </div>
  

  <div class="flex h-screen overflow-hidden">
    <div w3-include-html="layouts/sidebar.html"></div>

    <div class="relative flex flex-1 flex-col overflow-x-hidden overflow-y-auto">
      <div @click="sidebarToggle = false" :class="sidebarToggle ? 'block lg:hidden' : 'hidden'"
        class="fixed w-full h-screen z-9 bg-gray-900/50"></div>
      <div w3-include-html="layouts/header.html"></div>
      <main>
        <div class="p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">
                    <div x-data="{ pageName: `Quản Lý Địa Chỉ`}">
                        <div class="mb-6 flex flex-wrap items-center justify-between gap-3">
                            <h2 class="text-xl font-semibold text-gray-800 dark:text-white/90" x-text="pageName"></h2>

                            <nav>
                                <ol class="flex items-center gap-1.5">
                                    <li>
                                        <a class="inline-flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400"
                                            href="index.html">
                                            Trang chủ
                                            <svg class="stroke-current" width="17" height="16" viewBox="0 0 17 16"
                                                fill="none" xmlns="http://www.w3.org/2000/svg">
                                                <path d="M6.0765 12.667L10.2432 8.50033L6.0765 4.33366" stroke=""
                                                    stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
                                            </svg>
                                        </a>
                                    </li>
                                    <li class="text-sm text-gray-800 dark:text-white/90" x-text="pageName"></li>
                                </ol>
                            </nav>
                        </div>
                    </div>
        <!-- THÔNG TIN USER -->
        <div class="mb-6 rounded-2xl border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-gray-800">
          <h2 class="mb-4 text-xl font-semibold text-gray-800 dark:text-white">
            Thông tin người dùng
          </h2>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
            <div><b>Tên:</b> <span id="user-name">—</span></div>
            <div><b>Email:</b> <span id="user-email">—</span></div>
            <div><b>Vai trò:</b> <span id="user-role">—</span></div>
            <div><b>Trạng thái:</b> <span id="user-status">—</span></div>
          </div>
        </div>

        <!-- DANH SÁCH ĐỊA CHỈ -->
        <div class="rounded-2xl border border-gray-200 bg-white p-6 dark:border-gray-800 dark:bg-gray-800">
          <h2 class="mb-4 text-xl font-semibold text-gray-800 dark:text-white">
            Danh sách địa chỉ
          </h2>

          <div id="address-list" class="space-y-4"></div>
        </div>

        <!-- BACK -->
        <div class="mt-6">
          <a href="user.html"
            class="inline-block rounded-lg bg-gray-600 px-4 py-2 text-sm font-medium text-white hover:bg-gray-700">
            ← Quay lại danh sách
          </a>
        </div>
    </div>
    </main>
  </div>

  <script>
    w3.includeHTML();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script type="module" src="../../controllers/ui/admin/user/user-address.js"></script>
  <script defer src="../../../assets/admin/scripts/bundle.js"></script>
</body>

</html>
