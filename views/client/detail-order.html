<!DOCTYPE html>
<html lang="vi">

<head>
    <title>Tính sơn | Jotun Vietnam</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="apple-touch-icon" href="../assets/client/img/apple-icon.png" />
    <link rel="shortcut icon" type="image/x-icon" href="../../assets/client/img/favicon.ico" />

    <link rel="stylesheet" href="../../assets/client/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../assets/client/css/templatemo.css" />
    <link rel="stylesheet" href="../../assets/client/css/custom.css" />

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;200;300;400;500;700;900&display=swap" />
    <link rel="stylesheet" href="../../assets/client/css/fontawesome.min.css" />
    <script src="https://www.w3schools.com/lib/w3.js"></script>
    <link rel="stylesheet" href="../../assets/client/css/account.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div w3-include-html="layouts/menu.html"></div>

    <div class="max-w-5xl mx-auto mt-10 px-4 mb-6">

        <!-- Title -->
        <h3 class="text-2xl font-semibold mb-6">
            Chi tiết đơn hàng
        </h3>

        <!-- Thông tin đơn hàng -->
        <div class="bg-white rounded-xl shadow p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">

                <p><span class="font-medium">Mã đơn:</span>
                    <span id="order-id" class="text-gray-700"></span>
                </p>

                <p><span class="font-medium">Ngày tạo:</span>
                    <span id="created-at" class="text-gray-700"></span>
                </p>

                <p><span class="font-medium">Trạng thái:</span>
                    <span id="status" class="inline-block px-3 py-1 rounded-full text-xs bg-yellow-100 text-yellow-700">
                    </span>
                </p>

                <p><span class="font-medium">Thanh toán:</span>
                    <span id="payment" class="text-gray-700"></span>
                </p>

                <p class="md:col-span-2">
                    <span class="font-medium">Địa chỉ giao:</span>
                    <span id="address" class="text-gray-700"></span>
                </p>

                <p class="md:col-span-2 text-lg font-semibold text-red-600">
                    Tổng tiền:
                    <span id="total"></span>
                </p>

            </div>
        </div>

        <!-- Danh sách sản phẩm -->
        <div class="flex items-center justify-between mb-3">
            <div>
                <p class="text-sm text-gray-500">Danh sách sản phẩm</p>
                <h4 class="text-xl font-semibold">Sản phẩm trong đơn</h4>
            </div>
            <span id="items-count" class="text-xs font-semibold px-3 py-1 rounded-full bg-slate-100 text-slate-700">
                0 sản phẩm
            </span>
        </div>

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b bg-gradient-to-r from-sky-50 to-white">
                <span class="text-sm font-medium text-gray-700">Chi tiết mặt hàng</span>
                <span class="text-xs text-gray-500">Giá đã bao gồm VAT</span>
            </div>

            <div class="overflow-x-auto">
                <table class="min-w-full text-sm">
                    <thead class="bg-gray-50 text-gray-600">
                        <tr>
                            <th class="px-6 py-3 text-left">Tên</th>
                            <th class="px-6 py-3 text-left">SKU</th>
                            <th class="px-6 py-3 text-right">Giá</th>
                            <th class="px-6 py-3 text-center">Số lượng</th>
                            <th class="px-6 py-3 text-right">Tạm tính</th>
                        </tr>
                    </thead>

                    <tbody id="order-items" class="divide-y divide-gray-100 bg-white">
                    </tbody>
                </table>
            </div>

            <p id="empty-items" class="hidden text-center text-gray-500 py-6">
                Không có sản phẩm trong đơn
            </p>
        </div>
    </div>

    <div w3-include-html="layouts/footer.html"></div>

    <script>
        w3.includeHTML();
    </script>
    <script src="../../assets/client/js/jquery-1.11.0.min.js"></script>
    <script src="../../assets/client/js/jquery-migrate-1.2.1.min.js"></script>
    <script src="../../assets/client/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/client/js/templatemo.js"></script>
    <script src="../../assets/client/js/custom.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="../../controllers/ui/client/detail-order.js"></script>
</body>

</html>
